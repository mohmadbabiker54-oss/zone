name: Build Android (Zoon - Ultimate Google Drive Logo Fix & APK)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Build Assets
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          mkdir -p dist && touch dist/index.html 
          npx cap sync android

      - name: Download, Purge Pink Background & Resize Logo
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick curl
          RES_DIR="android/app/src/main/res"
          
          # 1. تنظيف المجلدات الفرعية من أي مخلفات قديمة
          find $RES_DIR -type f -name "ic_launcher*.png" -delete
          find $RES_DIR -type f -name "splash.png" -delete

          # 2. تحميل الصورة الخام مباشرة من جوجل درايف باستخدام المعرف الفريد
          mkdir -p resources
          echo "Downloading Sovereign Zoon Logo from Google Drive..."
          curl -sL "https://docs.google.com/uc?export=download&id=1T9BVEcfQqCh62Va0WgdW5ZwkeTaIBCTG" -o resources/raw_icon.png

          # 3. معالجة بصرية ذكية: إزالة اللون القريب من البمبي/الوردي وجعل الخلفية بيضاء ناصعة
          # الأداة ستقوم بتحويل اللون الخلفي إلى شفاف ثم دمج الشعار فوق خلفية بيضاء صافية لتأمين الهوية البصرية لـ Zoon
          if [ -f "resources/raw_icon.png" ]; then
            echo "Processing image: Converting pinkish backgrounds to absolute white..."
            convert resources/raw_icon.png -fuzz 25% -transparent "#FFC0CB" -background "#FFFFFF" -flatten resources/icon.png || cp resources/raw_icon.png resources/icon.png
          fi

          # 4. هندسة المقاسات والأبعاد القياسية وتوزيعها عبر طبقات النظام (Foreground)
          if [ -f "resources/icon.png" ]; then
            echo "Injecting resized logos into Android resource buckets..."
            find $RES_DIR -type d -name "mipmap-*" -exec convert "resources/icon.png" -resize 192x192 {}/ic_launcher_foreground.png \;
            # توليد أيقونة تقليدية كاحتياط للأنظمة القديمة جداً
            find $RES_DIR -type d -name "mipmap-*" -exec convert "resources/icon.png" -resize 192x192 {}/ic_launcher.png \;
          else
            echo "Critical Error: Logo could not be prepared, using standard cryptographic identifier fallback."
            find $RES_DIR -type d -name "mipmap-*" -exec convert -size 192x192 xc:none -pointsize 72 -fill "#008577" -gravity center -draw "text 0,0 'Z'" {}/ic_launcher_foreground.png \;
          fi

          # 5. بناء هيكل الأيقونة التكيفية (Adaptive Icon Architecture)
          mkdir -p $RES_DIR/mipmap-anydpi-v26
          cat <<EOF > $RES_DIR/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background" />
              <foreground android:drawable="@mipmap/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          # 6. تثبيت اللون الأبيض للخلفية برمجياً لمنع "القطعة البيضاء الصامتة"
          mkdir -p $RES_DIR/values
          cat <<EOF > $RES_DIR/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#FFFFFF</color>
          </resources>
          EOF

          # تنظيف ملفات الخلفيات القديمة المتعارضة
          find $RES_DIR -name "ic_launcher_background.xml" -not -path "*/mipmap-anydpi-v26/*" -delete

      - name: Sovereign SDK 36 Alignment
        run: |
          cd android
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Zoon Sovereign APK
        run: |
          cd android
          ./gradlew clean assembleRelease --no-daemon

      - name: Upload Zoon Sovereign APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Perfect-Icon-APK
          path: android/app/build/outputs/apk/release/*.apk
