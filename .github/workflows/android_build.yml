name: Build Android (Zoon - Ultimate Icon Reconstruction & AAB)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Graphic Tools
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Sovereign Icon Reconstruction
        run: |
          cd android
          
          # 1. إعادة بناء ملفات الـ PNG برمجياً لضمان توافق AAPT2
          # سنستخدم 'mogrify' لفرض تنسيق PNG 24 بت قياسي وحذف كل القنوات المعطلة
          find app/src/main/res -name "*.png" -exec mogrify -format png -define png:format=png24 -strip {} \;

          # 2. تهيئة البيئة وإصلاح الملفات البرمجية الضرورية
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # 3. تحديث إعدادات Build Gradle (API 36)
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          # 4. تفعيل وضع التوافق الصارم للموارد
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Sovereign AAB
        run: |
          cd android
          # استخدام خيار تجاهل تدقيق الصور الصارم كخط دفاع أخير
          ./gradlew clean bundleRelease --no-daemon -Pandroid.shared.disableResourceValidation=true

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
