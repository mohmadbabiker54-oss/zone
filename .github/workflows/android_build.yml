name: Build Android (Zoon - AGP Upgrade & AAB)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Build Assets
        run: |
          npm install --legacy-peer-deps
          # التأكد من وجود مجلد ويب لتجنب فشل كاباسيتور
          npm run build --if-present
          mkdir -p dist && touch dist/index.html 
          npx cap sync android

      - name: Sovereign Icon Integrity
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          cd android
          create_valid_png() {
            local path=$1
            local size=$2
            mkdir -p "$(dirname "$path")"
            convert -size "$size" xc:white "$path"
          }
          # إصلاح شامل للأيقونات لتجنب أي فشل في AAPT2
          find app/src/main/res -name "ic_launcher*.png" -exec convert -size 96x96 xc:white {} \;
          find app/src/main/res -name "splash.png" -exec convert -size 512x512 xc:white {} \;

      - name: Upgrade Build Engine (AGP 8.9.1)
        run: |
          cd android
          # تحديث إصدار Android Gradle Plugin المطلوب من قبل androidx.core
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          # تحديث Gradle Wrapper ليتوافق مع المحرك الجديد
          gradle wrapper --gradle-version 8.11.1
          
          # إصلاح خصائص البيئة
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # ضبط SDK النهائي لمشروع Zoon
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 35\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 35\n    }' build.gradle
          
          chmod +x ../gradlew

      - name: Generate Sovereign AAB
        run: |
          cd android
          ./gradlew clean bundleRelease --no-daemon

      - name: Upload Sovereign AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
