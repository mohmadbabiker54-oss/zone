name: Build Android (Zoon - XML Structure Fix)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Build Assets
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          mkdir -p dist && touch dist/index.html 
          npx cap sync android

      - name: Resource Structural Repair
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          cd android/app/src/main/res
          
          # 1. إعادة إنشاء ملف الألوان بصيغة XML سليمة تماماً
          mkdir -p values
          cat <<EOF > values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#FFFFFF</color>
              <color name="colorPrimary">#008577</color>
              <color name="colorPrimaryDark">#00574B</color>
              <color name="colorAccent">#D81B60</color>
          </resources>
          EOF

          # 2. حذف وإعادة إنشاء ic_launcher_background.xml بصيغة Vector سليمة
          mkdir -p drawable
          cat <<EOF > drawable/ic_launcher_background.xml
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF

          # 3. تطهير كافة صور الأيقونات والـ Splash لضمان قبول AAPT2
          find . -name "ic_launcher*.png" -exec convert -size 192x192 xc:white {} \;
          find . -name "splash.png" -exec convert -size 512x512 xc:white {} \;

      - name: Sovereign SDK 36 Alignment
        run: |
          cd android
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Sovereign AAB
        run: |
          cd android
          ./gradlew clean bundleRelease --no-daemon

      - name: Upload Sovereign AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
