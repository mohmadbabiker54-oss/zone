name: Build Android (Zoon - Precise PNG Repair & AAB)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pngcrush
        run: sudo apt-get update && sudo apt-get install -y pngcrush

      - name: Sovereign Icon Integrity Repair
        run: |
          cd android
          
          # 1. إصلاح ملفات الـ PNG المتضررة تقنياً باستخدام pngcrush
          # هذه الأداة تعيد بناء هيكل الملف ليصبح معيارياً 100% بالنسبة لأندرويد
          find app/src/main/res -name "*.png" -exec pngcrush -ow -rem allb -reduce {} \;

          # 2. تهيئة ملف الخصائص وحل مشكلة المسارات
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          # 3. إصلاح Java Access (الضروري برمجياً)
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # 4. تحديث إعدادات البناء لتتوافق مع Google Play
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Sovereign AAB
        run: |
          cd android
          ./gradlew clean bundleRelease --no-daemon

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
