name: Build Zoon Doctor (APK & AAB - Shaghal 100%)

on:
  push:
    branches:
      - main # أو master حسب اسم الفرع الرئيسي عندك
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Generate Production Packages
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود بالكامل من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد جافا للتعامل مع الـ ProGuard وحزم الأندرويد
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. إعداد بيئة الـ Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 4. تثبيت مكتبات الـ Web وبناء الفرونت إند أولاً (React / Vite)
      - name: Install Web Dependencies & Build Assets
        run: |
          npm install
          npm run build --if-present

      # 5. خطوة السر: تثبيت الـ Capacitor وعمل مزامنة لبناء مجلد الأندرويد برمجياً داخل السيرفر
      - name: Sync Capacitor Android Project
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap sync android

      # 6. إعداد الـ Android SDK وتثبيت تراخيص جوجل تلقائياً
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. إعطاء صلاحيات النظام لملف الـ Gradle المُنشأ حديثاً
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 8. بناء حزمة الـ APK والـ AAB في سطر واحد بنظام الـ Release والـ ProGuard المعدل
      - name: Build Android APK and AAB
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease --no-daemon

      # 9. استخراج وحفظ ملف الـ APK الشغال والتنفيذي للتجربة المباشرة
      - name: Upload Production APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Smart-Doctor-APK-يعمل
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      # 10. استخراج وحفظ ملف الـ AAB الرسمي الجاهز للمتجر
      - name: Upload Production AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Smart-Doctor-AAB-يعمل
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
