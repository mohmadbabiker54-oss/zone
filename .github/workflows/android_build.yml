name: Build Android (Zoon - Final Assets Fix)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Assets (CRITICAL STEP)
        run: |
          # هذه الخطوة تنشئ مجلد dist المطلوب
          npm run build --if-present
          # في حال لم يكن هناك أمر build، سننشئ المجلد يدوياً لضمان عدم توقف Capacitor
          mkdir -p dist && touch dist/index.html 
          npx cap sync android

      - name: Absolute Icon & Splash Reconstruction
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          cd android
          
          create_valid_png() {
            local path=$1
            local size=$2
            mkdir -p "$(dirname "$path")"
            convert -size "$size" xc:white "$path"
          }

          # بناء الأيقونات الأساسية والفرعية لضمان قبول AAPT2
          create_valid_png "app/src/main/res/mipmap-mdpi/ic_launcher.png" "48x48"
          create_valid_png "app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png" "48x48"
          create_valid_png "app/src/main/res/mipmap-mdpi/ic_launcher_round.png" "48x48"
          
          create_valid_png "app/src/main/res/mipmap-hdpi/ic_launcher.png" "72x72"
          create_valid_png "app/src/main/res/mipmap-xhdpi/ic_launcher.png" "96x96"
          create_valid_png "app/src/main/res/mipmap-xxhdpi/ic_launcher.png" "144x144"
          create_valid_png "app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" "192x192"
          
          find app/src/main/res -name "splash.png" -exec convert -size 512x512 xc:white {} \;

      - name: Final Technical Repair
        run: |
          cd android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Sovereign AAB
        run: |
          cd android
          ./gradlew clean bundleRelease --no-daemon

      - name: Upload Sovereign AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
