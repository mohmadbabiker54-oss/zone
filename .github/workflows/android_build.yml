name: Build Android (Zoon - Manifest & Ultimate Build)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Build Assets
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          mkdir -p dist && touch dist/index.html 
          npx cap sync android

      - name: Auto-Fix AndroidManifest Structure & Inject ProGuard
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PROGUARD_PATH="android/app/proguard-rules.pro"

          # 1. إعادة بناء وهيكلة ملف الـ AndroidManifest برمجياً لتفادي أخطاء الـ Parsing والـ Merger نهائياً
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Re-structuring AndroidManifest to fix location/gps elements tag alignment..."
            
            cat <<EOF > $MANIFEST_PATH
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">

    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
    
    <uses-permission android:name="android.permission.CAMERA" />
    <uses-feature android:name="android.hardware.camera" android:required="false" />
    
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
    <uses-feature android:name="android.hardware.location.gps" android:required="true" />

    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:roundIcon="@mipmap/ic_launcher"
        android:supportsRtl="true"
        android:usesCleartextTraffic="true"
        android:theme="@style/AppTheme">
        
        <activity
            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
            android:name="com.zoon.agri.app.MainActivity"
            android:label="@string/title_activity_main"
            android:theme="@style/AppTheme.NoActionBar"
            android:launchMode="singleTop"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>

        <provider
            android:name="androidx.core.content.FileProvider"
            android:authorities="\${applicationId}.fileprovider"
            android:exported="false"
            android:grantUriPermissions="true">
            <meta-data
                android:name="android.support.FILE_PROVIDER_PATHS"
                android:resource="@xml/file_paths" />
        </provider>
    </application>
</manifest>
EOF
          fi

          # 2. تأمين قواعد ProGuard لمنع تشفير كلاسات الـ AI والـ JSON المرسلة للسيرفر
          if [ -f "$PROGUARD_PATH" ]; then
            echo "Injecting ProGuard rules..."
            cat <<EOF >> $PROGUARD_PATH
            -keepattributes Signature,Annotation,*Annotation*,EnclosingMethod,InnerClasses
            -keepclassmembers class * {
                @com.google.gson.annotations.SerializedName <fields>;
            }
            -keep class com.google.gson.** { *; }
            -dontwarn okio.**
            -dontwarn javax.annotation.**
          EOF
          fi

      - name: Super Deep Resource Clean & Secured Logo Maintenance
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick curl
          RES_DIR="android/app/src/main/res"
          
          # تنظيف فائق العمق لملفات النظام الميتة لضمان أقصى درجات النقاوة وخفة الحجم
          find $RES_DIR -type f -name "ic_launcher*.png" -delete
          find $RES_DIR -type f -name "ic_launcher*.xml" -not -path "*/mipmap-anydpi-v26/*" -delete
          find $RES_DIR -type f -name "*_round.png" -delete
          find $RES_DIR -type f -name "*_round.xml" -delete
          find $RES_DIR -type f -name "splash*.png" -delete
          find $RES_DIR -type f -name "splash*.xml" -not -path "*/drawable/*" -delete

          # جلب وتأمين أيقونة زون الممتازة المعتمدة من جوجل درايف
          mkdir -p resources
          curl -sL "https://docs.google.com/uc?export=download&id=1T9BVEcfQqCh62Va0WgdW5ZwkeTaIBCTG" -o resources/raw_icon.png

          # الفلتر البرمجي لتنقية الشعار وجعل الخلفية بيضاء ناصعة وممتازة
          if [ -f "resources/raw_icon.png" ]; then
            convert resources/raw_icon.png -fuzz 25% -transparent "#FFC0CB" -background "#FFFFFF" -flatten resources/icon.png || cp resources/raw_icon.png resources/icon.png
          fi

          # توزيع الأيقونة النظيفة على مجلدات أندرويد بالمقاسات الهندسية القياسية
          if [ -f "resources/icon.png" ]; then
            find $RES_DIR -type d -name "mipmap-*" ! -name "mipmap-anydpi-v26" -exec convert "resources/icon.png" -resize 192x192 {}/ic_launcher_foreground.png \;
            find $RES_DIR -type d -name "mipmap-*" ! -name "mipmap-anydpi-v26" -exec convert "resources/icon.png" -resize 192x192 {}/ic_launcher.png \;
          fi

          # حماية هيكل الأيقونة التكيفية (Adaptive Icon) لمنع التمدد أو التشوه
          mkdir -p $RES_DIR/mipmap-anydpi-v26
          cat <<EOF > $RES_DIR/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background" />
              <foreground android:drawable="@mipmap/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          mkdir -p $RES_DIR/values
          cat <<EOF > $RES_DIR/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#FFFFFF</color>
          </resources>
          EOF

          find $RES_DIR -name "ic_launcher_background.xml" -not -path "*/mipmap-anydpi-v26/*" -delete

      - name: Sovereign SDK 36 Alignment
        run: |
          cd android
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Add Splash Screen Resource
        run: |
          RES_DIR="android/app/src/main/res"          
          mkdir -p $RES_DIR/drawable
          cat <<'EOF' > $RES_DIR/drawable/splash.xml
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white" />
              <item>
                  <bitmap
                      android:src="@mipmap/ic_launcher"
                      android:gravity="center" />
              </item>
          </layer-list>
          EOF

      - name: Generate Zoon Sovereign AAB & APK Together
        run: |
          cd android
          ./gradlew clean --no-daemon
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Upload Zoon Sovereign Fixed Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Sovereign-Outputs-(APK-&-AAB)
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
