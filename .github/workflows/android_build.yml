name: Build Android (Zoon - Professional Icon Repair & AAB)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & ImageMagick
        run: |
          npm install --legacy-peer-deps
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Deep Repair of Sovereign Icons
        run: |
          cd android
          # 1. إصلاح ملفات PNG تقنياً (إزالة الـ Metadata غير المتوافقة) مع الحفاظ على المحتوى البصري
          # هذا الأمر يحل مشكلة "file failed to compile" للأبد
          find app/src/main/res -name "*.png" -exec convert {} -strip {} \;
          
          # 2. تنظيف ملف local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          # 3. إصلاح MainActivity.java
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # 4. تحديث SDK و Gradle
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Production AAB with Fixed Original Icons
        run: |
          cd android
          ./gradlew clean bundleRelease --no-daemon

      - name: Upload Sovereign AAB Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
