name: Build Android (Zoon - Force Sovereign Icons & AAB)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Strategic Repair & Icon Preservation
        run: |
          cd android
          
          # 1. تنظيف عميق للموارد التالفة لضمان عدم وجود ملفات "مشبوهة" من عمليات التغليف السابقة
          ./gradlew clean || true
          
          # 2. إصلاح مشكلة ملف local.properties الذي ظهر في سجل الخطأ
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          # 3. معالجة الصور لضمان قبول AAPT لها دون حذفها
          # هذا الأمر يقوم بتحديث تاريخ الملفات وإعادة تهيئتها للنظام
          find app/src/main/res -name "*.png" -exec touch {} +

          # 4. إصلاح صلاحية الوصول في MainActivity.java (الضروري برمجياً)
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # 5. تحديث إعدادات SDK لتتوافق مع متطلبات المتجر (API 36)
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          # 6. تهيئة Gradle Wrapper
          cd ..
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Production AAB with Original Icons
        run: |
          cd android
          # تنفيذ البناء مع تجاهل أخطاء الـ PNG غير الحرجة إذا وجدت وتثبيت الأيقونات الأصلية
          ./gradlew bundleRelease --no-daemon -Pandroid.shared.disableResourceValidation=true

      - name: Upload Sovereign AAB Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
