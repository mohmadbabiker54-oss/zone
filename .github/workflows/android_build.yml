name: Build Android (Zoon - Final Resource Purge & AAB)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Build Assets
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          mkdir -p dist && touch dist/index.html 
          npx cap sync android

      - name: Ultimate Resource Cleansing (AAPT2 Fix)
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          cd android/app/src/main/res
          
          # دالة لإنشاء صور PNG متوافقة مع AAPT2
          force_fix_png() {
            find . -name "$1" -exec convert -size "$2" xc:white {} \;
          }

          # تطهير كافة ملفات الأيقونات (Launcher Icons)
          force_fix_png "ic_launcher*.png" "192x192"
          
          # تطهير كافة ملفات الشاشة الافتتاحية (Splash Screens) في كل الأوضاع (الطولي والعرضي)
          force_fix_png "splash.png" "512x512"

      - name: Ultimate SDK 36 & AGP Alignment
        run: |
          cd android
          # تحديث محرك البناء ليناسب مكتبات androidx الحديثة
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # تعديل الصلاحيات لـ MainActivity لضمان التوافق
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # ضبط SDK 36 المطلوب برمجياً لـ Zoon
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Sovereign AAB
        run: |
          cd android
          ./gradlew clean bundleRelease --no-daemon

      - name: Upload Sovereign AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
