name: Build Android (Zoon - Force Reconstruction & AAB)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean Install Dependencies
        run: |
          npm cache clean --force
          npm install --legacy-peer-deps
          npx cap sync android

      - name: Absolute Icon & Splash Reconstruction
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          cd android
          
          # دالة لإنشاء صورة PNG حقيقية لتجنب خطأ الـ Header
          create_valid_png() {
            local path=$1
            local size=$2
            mkdir -p "$(dirname "$path")"
            convert -size "$size" xc:white "$path"
          }

          # إعادة بناء كافة الأيقونات المعطوبة بصور بيضاء نظيفة (مؤقتاً لتمرير البناء)
          # يمكنك استبدالها لاحقاً برفع صور سليمة للمستودع
          create_valid_png "app/src/main/res/mipmap-mdpi/ic_launcher.png" "48x48"
          create_valid_png "app/src/main/res/mipmap-hdpi/ic_launcher.png" "72x72"
          create_valid_png "app/src/main/res/mipmap-xhdpi/ic_launcher.png" "96x96"
          create_valid_png "app/src/main/res/mipmap-xxhdpi/ic_launcher.png" "144x144"
          create_valid_png "app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" "192x192"
          
          # إصلاح صور الشاشة الافتتاحية (Splash)
          find app/src/main/res -name "splash.png" -exec convert -size 512x512 xc:white {} \;

      - name: Final Technical Repair
        run: |
          cd android
          # إصلاح ملف local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # إصلاح Java Access
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # ضبط SDK وتوافق الإصدارات
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Sovereign AAB
        run: |
          cd android
          ./gradlew clean bundleRelease --no-daemon

      - name: Upload Sovereign AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
