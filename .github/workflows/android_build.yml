name: Build Android (Zoon - SDK 36 Final Alignment)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Build Assets
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          mkdir -p dist && touch dist/index.html 
          npx cap sync android

      - name: Sovereign Icon Integrity
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          cd android
          # إصلاح شامل للأيقونات لتجنب أي فشل في محرك الرسوميات
          find app/src/main/res -name "ic_launcher*.png" -exec convert -size 96x96 xc:white {} \;
          find app/src/main/res -name "splash.png" -exec convert -size 512x512 xc:white {} \;

      - name: Ultimate SDK 36 Alignment
        run: |
          cd android
          # تحديث محرك البناء AGP ليتوافق مع المتطلبات الجديدة
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          # ضبط ملفات الخصائص
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # التعديل الجوهري: رفع compileSdk و targetSdk إلى 36
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Generate Sovereign AAB
        run: |
          cd android
          ./gradlew clean bundleRelease --no-daemon

      - name: Upload Sovereign AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Production-Bundle
          path: android/app/build/outputs/bundle/release/*.aab
