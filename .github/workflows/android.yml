name: Build Android App (APK & AAB)

on:
  push:
    branches:
      - main # أو master حسب اسم الفرع الرئيسي لديك
  pull_request:
    branches:
      - main
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من موقع GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 1. بناء ملف الـ APK (نسخة الـ Debug للتجربة)
    - name: Build APK
      run: ./gradlew assembleDebug

    # 2. بناء ملف الـ AAB (نسخة الـ Release للمتجر)
    - name: Build AAB
      run: ./gradlew bundleRelease

    # 3. رفع وحفظ ملف الـ APK كمخرج للعملية (Artifact)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    # 4. رفع وحفظ ملف الـ AAB كمخرج للعملية (Artifact)
    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
