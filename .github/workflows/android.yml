name: Build Android Production App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Generate APK and AAB Packages
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الأكواد من المستودع
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا (JDK 17)
    - name: Set up Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # 3. إعداد بيئة Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 4. تثبيت مكتبات المشروع مع تخطي تعارض الإصدارات
    - name: Install Project Dependencies
      run: npm install --legacy-peer-deps

    # 5. حل تعارض مكتبة core-ktx وإجبارها على إصدار متوافق مع إعدادات مشروعك
    - name: Enforce Compatible Core-Ktx Version
      run: |
        cat << 'EOF' >> android/build.gradle
        subprojects {
            configurations.all {
                resolutionStrategy.force 'androidx.core:core-ktx:1.13.1'
                resolutionStrategy.force 'androidx.core:core:1.13.1'
            }
        }
        EOF

    # 6. خطوة حاسمة: إصلاح وحذف ملف الأيقونة المعطوب من الـ values والـ drawable لضمان بناء نظيف
    - name: Fix and Clean Launcher Background XML
      run: |
        # حذف الملف من مجلد القيم التكراري
        rm -f android/app/src/main/res/values/ic_launcher_background.xml
        
        # إنشاء ملف drawable بديل سليم وصحيح برمجياً بلون افتراضي أبيض لتفادي خطأ الـ XML المعطوب
        mkdir -p android/app/src/main/res/drawable
        cat << 'EOF' > android/app/src/main/res/drawable/ic_launcher_background.xml
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path
                android:fillColor="#FFFFFF"
                android:pathData="M0,0h108v108H0z"/>
        </vector>
        EOF

    # 7. إعداد أداة Gradle بإصدار 8.4 النظيف
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # 8. بناء ملف الـ APK
    - name: Compile and Build APK
      run: gradle assembleDebug
      working-directory: ./android

    # 9. بناء ملف الـ AAB للمتجر
    - name: Compile and Build App Bundle (AAB)
      run: gradle bundleRelease
      working-directory: ./android

    # 10. استخراج وحفظ ملف الـ APK كمخرج للتحميل
    - name: Archive and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GoogleStudio-App-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # 11. استخراج وحفظ ملف الـ AAB كمخرج للرفع للمتجر
    - name: Archive and Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: GoogleStudio-App-Production-AAB
        path: android/app/build/outputs/bundle/release/app-release*.aab
        retention-days: 7
