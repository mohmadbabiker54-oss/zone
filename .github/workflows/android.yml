name: Build Android Production App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Generate APK and AAB Packages
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الأكواد من المستودع
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا (JDK 17)
    - name: Set up Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # 3. إعداد بيئة Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 4. تثبيت مكتبات المشروع مع تخطي تعارض الإصدارات (تم التحديث هنا)
    - name: Install Project Dependencies
      run: npm install --legacy-peer-deps

    # 5. إعداد أداة Gradle الرسمية بشكل نظيف تلقائياً
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    # 6. بناء ملف الـ APK
    - name: Compile and Build APK
      run: gradle assembleDebug
      working-directory: ./android

    # 7. بناء ملف الـ AAB للمتجر
    - name: Compile and Build App Bundle (AAB)
      run: gradle bundleRelease
      working-directory: ./android

    # 8. استخراج وحفظ ملف الـ APK كمخرج للتحميل
    - name: Archive and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GoogleStudio-App-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # 9. استخراج وحفظ ملف الـ AAB كمخرج للرفع للمتجر
    - name: Archive and Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: GoogleStudio-App-Production-AAB
        path: android/app/build/outputs/bundle/release/app-release*.aab
        retention-days: 7
