name: Build Android APK & AAB (Fixed Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # الحل هنا: استخدام legacy-peer-deps لتجاوز تضارب إصدارات Capacitor
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Build Debug Bundle (AAB)
        run: cd android && ./gradlew bundleDebug

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Final-Build
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
