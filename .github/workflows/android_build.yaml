name: Build Android (Final Sovereign Protocol - Gradle 8.11.1)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Auto-Patch to Modern Standards (SDK 36 & Gradle 8.11.1)
        run: |
          cd android
          # 1. تحديث الـ SDK برمجياً لمواكبة متطلبات 2026
          sed -i 's/compileSdk = [0-9]*/compileSdk = 36/g' variables.gradle || true
          sed -i 's/targetSdk = [0-9]*/targetSdk = 36/g' variables.gradle || true
          
          # 2. تحديث Plugin أندرويد ليتوافق مع المكتبات المطلوبة
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          # 3. تحديث الـ Gradle Wrapper إلى الإصدار المطلوب 8.11.1
          rm -rf gradle/wrapper/gradle-wrapper.jar
          # تحميل النسخة المحددة المطلوبة في السجل (8.11.1)
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Build with Maximum Compatibility
        run: |
          cd android
          # تنظيف شامل قبل البناء النهائي
          rm -rf ~/.gradle/caches/jars-9
          ./gradlew clean assembleDebug bundleDebug \
            --no-daemon \
            --project-cache-dir="./.gradle_isolated_final" \
            --stacktrace

      - name: Upload Sovereign Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Complete-2026
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
