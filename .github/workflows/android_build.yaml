name: Build Android APK & AAB (Compatibility Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # تثبيت نسخة Gradle متوافقة (8.2) لتجنب أخطاء الإصدار 9
      - name: Setup Gradle 8.2
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Debug APK
        run: |
          cd android
          gradle assembleDebug --warning-mode none

      - name: Build Debug Bundle (AAB)
        run: |
          cd android
          gradle bundleDebug --warning-mode none

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Final-App
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
