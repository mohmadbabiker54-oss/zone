name: Build Android APK & AAB (Future Ready)

on:
  workflow_dispatch:

env:
  # هذا المتغير يحل المشكلة التي ظهرت في التحذير ويجبر النظام على استخدام Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # استخدام النسخة الأحدث مباشرة

      - name: Install Dependencies
        run: npm install

      - name: Grant execute permission for gradlew
        run: cd android && chmod +x gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Build Debug Bundle (AAB)
        run: cd android && ./gradlew bundleDebug

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Build-Package
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
