name: Build Android APK & AAB (Stable Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # تحسين الأداء وتجنب تعارض النسخ
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # لجلب كامل الأرشيف لضمان الدقة في التوقيت والبيانات

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # تسريع عمليات البناء المستقبلي

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # العودة للنسخة المستقرة لهذه الأدوات حالياً لتجنب التعارض
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Grant execute permission for gradlew
        run: cd android && chmod +x gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Build Debug Bundle (AAB)
        run: cd android && ./gradlew bundleDebug

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Build-Package
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
