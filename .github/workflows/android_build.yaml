name: Build Android (Zoon 2026 - Precise Patching)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Precise Android Metadata Patching
        run: |
          cd android
          # تنظيف الملفات المتضررة من المحاولة السابقة
          git checkout variables.gradle || true
          
          # استبدال ذكي: نبحث عن السطر الذي يحتوي على compileSdk ونعيد كتابته بالكامل
          sed -i '/compileSdk/c\    compileSdk = 36' variables.gradle || true
          sed -i '/targetSdk/c\    targetSdk = 36' variables.gradle || true
          
          # استبدال في ملفات build.gradle (النمط القديم والجديد)
          find . -type f -name "build.gradle" -exec sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/g' {} +
          find . -type f -name "build.gradle" -exec sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 36/g' {} +
          
          # تحديث الـ Plugin ليتوافق مع Gradle 9+
          find . -type f -name "build.gradle" -exec sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' {} +
          
          # ضبط الـ Wrapper لإصدار مستقر يدعم Java 21 و SDK 36
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Build with Clean State
        run: |
          cd android
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload Zoon Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Build-Fixed
          path: android/app/build/outputs/apk/debug/*.apk
