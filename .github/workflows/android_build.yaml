name: Build Android (Zoon Final Fix - XML Repair)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Repair Resources & System Upgrade
        run: |
          cd android
          
          # 1. إصلاح ملف XML التالف (إعادة كتابة الملف بمحتوى سليم)
          # سنقوم بإنشاء خلفية بسيطة بلون واحد لضمان قبول النظام للملف
          mkdir -p app/src/main/res/drawable
          cat <<EOF > app/src/main/res/drawable/ic_launcher_background.xml
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF

          # 2. حذف النسخة المكررة في مجلد values لضمان عدم حدوث تعارض
          rm -f app/src/main/res/values/ic_launcher_background.xml || true
          
          # 3. تحديث إصدار Plugin أندرويد 8.9.1
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          # 4. ضبط الـ SDK على الإصدار 36
          cd app
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        targetSdk 36\n    }' build.gradle
          
          # 5. تحديث Gradle Wrapper
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Execute Sovereign Build
        run: |
          cd android
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload Sovereign Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Build-Fixed-XML
          path: android/app/build/outputs/apk/debug/*.apk
