name: Build Android APK & AAB (Final Stability Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # حل مشكلة الملف التالف: استخدام نسخة Gradle المثبتة في النظام مباشرة
      - name: Build Debug APK (Using System Gradle)
        run: |
          cd android
          gradle assembleDebug

      - name: Build Debug Bundle (Using System Gradle)
        run: |
          cd android
          gradle bundleDebug

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-App-Build
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
