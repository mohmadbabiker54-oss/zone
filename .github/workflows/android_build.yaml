name: Build Android (Isolated Sovereign Protocol 2026)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare Clean Environment
        run: |
          cd android
          # تنظيف جذري لبيئة Capacitor و Gradle
          rm -rf ~/.gradle/caches/
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build with Isolated Cache
        run: |
          cd android
          # استخدام مجلد مؤقت مخصص (Isolated Dir) لتجنب فشل إنشاء Jar
          ./gradlew clean assembleDebug bundleDebug \
            --no-daemon \
            --project-cache-dir="./.gradle_isolated" \
            --stacktrace \
            --warning-mode none

      - name: Upload Sovereign Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-V4-2026
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab

      - name: Sovereign Final Report
        if: always()
        run: |
          echo "### 🛠️ تقرير الصيانة السيادية 2026" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ **النتيجة:** تم تفعيل العزل التقني واستخراج النسخة بنجاح." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **النتيجة:** تعارض مستمر في ':capacitor-app'. يتطلب فحص يدوي لملفات التكوين." >> $GITHUB_STEP_SUMMARY
          fi
