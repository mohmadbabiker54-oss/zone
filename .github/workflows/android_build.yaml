name: Build Android APK & AAB (Optimized Cache)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # استخدام ميزة التخزين التلقائي للجافا كما ورد في الوثائق
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # تطبيق بروتوكول الذاكرة المؤقتة الذي أرسلته (Cache Action)
      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # إنشاء مفتاح فريد بناءً على نظام التشغيل وبصمة ملفات الإعداد
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug bundleDebug --warning-mode none

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Optimized-Package
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab

      - name: Generate Job Summary
        run: |
          echo "### 🚀 تم البناء باستخدام تقنية الذاكرة المؤقتة (Cache)" >> $GITHUB_STEP_SUMMARY
          echo "- **الحالة:** تم تحديث الذاكرة وضمان سلامة الملفات." >> $GITHUB_STEP_SUMMARY
          echo "- **المخرجات:** APK و AAB بانتظارك في قسم المرفقات." >> $GITHUB_STEP_SUMMARY
