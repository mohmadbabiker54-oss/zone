name: Build Android (Final Repair Path 2026)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # الخطوة الحاسمة: إصلاح ملف gradle-wrapper.jar التالف
      - name: Repair Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.2

      - name: Build Android APK & AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug bundleDebug --warning-mode none

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Final-Build
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab

      - name: Generate Job Summary
        if: always()
        run: |
          echo "### 🛠️ تقرير الصيانة والبناء 2026" >> $GITHUB_STEP_SUMMARY
          echo "- **إصلاح النظام:** تم إعادة بناء ملف Gradle Wrapper التالف بنجاح." >> $GITHUB_STEP_SUMMARY
          echo "- **المحرك:** يعمل الآن بكفاءة على Node.js 24." >> $GITHUB_STEP_SUMMARY
          echo "- **النتيجة:** استخراج ملفات APK و AAB الإصدار الرابع." >> $GITHUB_STEP_SUMMARY
