name: Build Android (Zoon Final Protocol - Comprehensive SDK Fix)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Force Patch All Android Metadata (SDK 36 & Gradle 8.11.1)
        run: |
          cd android
          # تحديث شامل لكل ملفات المشروع لضمان الانتقال لـ SDK 36
          find . -type f -name "*.gradle" -exec sed -i 's/compileSdk = [0-9]*/compileSdk = 36/g' {} +
          find . -type f -name "*.gradle" -exec sed -i 's/targetSdk = [0-9]*/targetSdk = 36/g' {} +
          find . -type f -name "*.gradle" -exec sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/g' {} +
          find . -type f -name "*.gradle" -exec sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 36/g' {} +
          
          # تحديث الـ Plugin ليتوافق مع المعايير الحديثة
          find . -type f -name "build.gradle" -exec sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' {} +
          
          # ترقية الـ Wrapper إلى الإصدار المطلوب 8.11.1
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Build with Sovereign Force
        run: |
          cd android
          # تنظيف الكاشات القديمة التي سببت تعارض bcprov
          rm -rf ~/.gradle/caches/jars-9
          ./gradlew clean assembleDebug bundleDebug \
            --no-daemon \
            --project-cache-dir="./.gradle_isolated_final" \
            --stacktrace

      - name: Upload Zoon Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Final-SDK36-V2026
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
