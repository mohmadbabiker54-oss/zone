name: Build Android (Zoon Final Fix - Resolved Duplicates)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Clean Duplicates & System Upgrade
        run: |
          cd android
          
          # 1. حل مشكلة Duplicate resources (حذف الملف المكرر)
          # نقوم بحذفه من مسار values ليبقى التعريف الموجود في colors.xml فقط
          rm -f app/src/main/res/values/ic_launcher_background.xml || true
          
          # 2. تحديث إصدار Plugin أندرويد ليتوافق مع مكتبات 2026
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          # 3. تحديث الـ SDK إلى الإصدار 36 المطلوب
          cd app
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        targetSdk 36\n    }' build.gradle
          
          # 4. تحديث Gradle Wrapper ليتوافق مع التعديلات الجديدة
          cd ..
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Execute Sovereign Build
        run: |
          cd android
          # تنظيف كامل قبل البناء لضمان عدم وجود مخلفات من محاولات فاشلة
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload Sovereign Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Build-Success
          path: android/app/build/outputs/apk/debug/*.apk
