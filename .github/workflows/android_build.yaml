name: Build Android (Zoon Sovereign Fix - Explicit SDK)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Explicit Android Configuration Injection
        run: |
          cd android/app
          # حذف السطور التي تحاول استدعاء متغيرات خارجية قد لا تكون موجودة في سياق الـ Runner
          sed -i '/compileSdkVersion/d' build.gradle || true
          sed -i '/targetSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true

          # حقن الإعدادات مباشرة في بداية كتلة أندرويد
          # نستخدم SDK 36 كما طلبت التحديثات السابقة لضمان التوافق
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        targetSdk 36\n    }' build.gradle

      - name: Sync Gradle Wrapper
        run: |
          cd android
          # نستخدم إصدار 8.11.1 المستقر لدعم Plugin 8.9.1 المطلوب
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Execute Clean Sovereign Build
        run: |
          cd android
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-App-SDK36
          path: android/app/build/outputs/apk/debug/*.apk
