name: Build Android (Sovereign Isolated Protocol 21)

on:
  workflow_dispatch:

env:
  # فرض استخدام أحدث بيئة عمل لضمان التوافق
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Fix for Major Version 65)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # حذفنا الكاش القديم لضمان عدم سحب ملفات تالفة
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Clean Corrupted Artifacts & Prepare Wrapper
        run: |
          cd android
          # تنظيف جذري للمجلدات التي تسبب الخطأ في سجلاتك
          rm -rf ~/.gradle/caches/jars-9
          rm -rf ~/.gradle/caches/modules-2
          # إعادة ضبط الـ Wrapper ليتوافق مع Java 21
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build with Isolated Sovereign Cache
        run: |
          cd android
          # استخدام بروتوكول العزل المخصص لمشروع Zoon
          ./gradlew clean assembleDebug bundleDebug \
            --no-daemon \
            --project-cache-dir="./.gradle_isolated_2026" \
            --stacktrace

      - name: Upload Sovereign Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Sovereign-V21
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab

      - name: Final Technical Report
        if: always()
        run: |
          echo "### 🛠️ تقرير البناء السيادي - تحديث Java 21" >> $GITHUB_STEP_SUMMARY
          echo "تم تحديث البيئة البرمجية لتتوافق مع مكتبات التشفير الحديثة (Version 65)." >> $GITHUB_STEP_SUMMARY
