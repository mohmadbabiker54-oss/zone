name: Build Android APK & AAB (Final Stability Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Gradle 8.2
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # حل مشكلة الـ Cache: تنظيف المشروع وإعادة بناء ملفات الجار
      - name: Clean and Build Android
        run: |
          cd android
          ./gradlew clean
          gradle assembleDebug bundleDebug --warning-mode none

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-App-Package
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab

      # إضافة ملخص العمل باستخدام Bash كما في البروتوكول الذي أرفقته
      - name: Generate Job Summary
        if: always()
        run: |
          echo "### 📊 ملخص عملية بناء التطبيق" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ **الحالة:** تم استخراج الملفات بنجاح!" >> $GITHUB_STEP_SUMMARY
            echo "تحقق من قسم **Artifacts** لتحميل ملفات APK و AAB." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **الحالة:** فشلت العملية." >> $GITHUB_STEP_SUMMARY
            echo "السبب المحتمل: مشكلة في توافق المكتبات أو الذاكرة المؤقتة." >> $GITHUB_STEP_SUMMARY
          fi
