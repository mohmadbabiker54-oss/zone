name: Build Android APK & AAB

on:
  workflow_dispatch: # للتشغيل اليدوي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4 # تحديث للإصدار الرابع

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # تحديث للإصدار الرابع
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4 # تحديث للإصدار الرابع
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      # لاحظ أننا نستخدم chmod للتأكد من أن ملف gradle لديه صلاحيات التنفيذ
      - name: Grant execute permission for gradlew
        run: cd android && chmod +x gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Build Debug Bundle (AAB)
        run: cd android && ./gradlew bundleDebug

      # هذا هو الجزء الذي تسبب في الخطأ وتم تحديثه هنا إلى v4
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4 
        with:
          name: Zoon-Build-Package
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
