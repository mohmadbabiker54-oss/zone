name: Build Android APK & AAB (Final Stability)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Gradle 8.2
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Android Files
        run: |
          cd android
          gradle assembleDebug bundleDebug --warning-mode none

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Final-Output
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab

      # إضافة ملخص العملية (Job Summary) كما ورد في شرح Bash الذي أرفقته
      - name: Generate Build Summary
        run: |
          echo "### 🚀 تم استخراج ملفات التطبيق بنجاح!" >> $GITHUB_STEP_SUMMARY
          echo "تحقق من قسم **Artifacts** لتحميل الملفات التالية:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **APK:** جاهز للتثبيت المباشر." >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **AAB:** جاهز للرفع على المتجر." >> $GITHUB_STEP_SUMMARY
