name: Build Android (Zoon Sovereign Protocol 2026 - SDK 36)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Auto-Patch Android Configurations (SDK 36 & AGP 8.9.1)
        run: |
          cd android
          # تحديث compileSdk و targetSdk إلى 36 برمجياً
          sed -i 's/compileSdk = [0-9]*/compileSdk = 36/g' variables.gradle || true
          sed -i 's/targetSdk = [0-9]*/targetSdk = 36/g' variables.gradle || true
          
          # تحديث إصدار Android Gradle Plugin ليناسب متطلبات المكتبات الحديثة
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          # تنظيف الذاكرة التالفة وإعادة ضبط الـ Wrapper
          rm -rf ~/.gradle/caches/jars-9
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build with Modern Android Protocol
        run: |
          cd android
          ./gradlew clean assembleDebug bundleDebug \
            --no-daemon \
            --project-cache-dir="./.gradle_isolated_v36" \
            --stacktrace

      - name: Upload Sovereign Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Final-SDK36
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
