name: Build Android (Zero-Failure Protocol 2026)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # المرحلة الحاسمة: تطهير شامل وإعادة بناء بيئة Gradle
      - name: Force Gradle Environment Reset
        run: |
          cd android
          # مسح كافة الملفات المؤقتة والمكتبات لضمان تحميل نسخة سليمة من bcprov
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/
          rm -rf gradle/wrapper/gradle-wrapper.jar
          # إعادة توليد الـ Wrapper بإصدار مستقر تماماً
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Execute Clean Production Build
        run: |
          cd android
          # استخدام --no-daemon لضمان عدم بقاء عمليات عالقة تسبب فشل الملفات
          ./gradlew clean assembleDebug bundleDebug --no-daemon --stacktrace

      - name: Upload Secured Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-App-Final-2026
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab

      - name: Final System Report
        if: always()
        run: |
          echo "### 🛠️ تقرير الصيانة السيادية 2026" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ **النتيجة:** تم تجاوز خطأ التشفير واستخراج التطبيق بنجاح." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **النتيجة:** تعارض في المكتبات. جاري فحص ملف capacitor-app." >> $GITHUB_STEP_SUMMARY
          fi
