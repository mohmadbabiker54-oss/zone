name: Build Android (Zoon Final Fix - Plugin 8.9.1)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Forced Plugin & SDK Upgrade
        run: |
          cd android
          # 1. تحديث إصدار Plugin أندرويد في ملف build.gradle الرئيسي
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          # 2. حقن إعدادات الـ SDK مباشرة داخل ملف app/build.gradle
          cd app
          # إزالة الاستدعاءات القديمة لضمان عدم حدوث تعارض LHS
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          # حقن القيم الجديدة 36 المطلوبة لعام 2026
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        targetSdk 36\n    }' build.gradle
          
          # 3. تحديث الـ Gradle Wrapper ليتوافق مع Plugin 8.9.1
          cd ..
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Execute Sovereign Build
        run: |
          cd android
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload Sovereign Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Final-2026
          path: android/app/build/outputs/apk/debug/*.apk
