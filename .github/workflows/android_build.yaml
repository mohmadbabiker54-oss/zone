name: Build Android (Zoon 2026 - Injection Protocol)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Forced Injection of Android SDK 36
        run: |
          cd android/app
          # حذف أي محاولات سابقة لاستدعاء متغيرات خارجية قد تكون مفقودة
          sed -i '/rootProject.ext.compileSdkVersion/d' build.gradle || true
          sed -i '/rootProject.ext.targetSdkVersion/d' build.gradle || true
          
          # حقن القيم مباشرة في ملف build.gradle الخاص بالتطبيق لضمان القراءة
          # سنضع القيم 36 بشكل صريح لإنهاء مشكلة "Property does not exist"
          sed -i 's/compileSdk .*/compileSdk 36/g' build.gradle || true
          sed -i 's/targetSdk .*/targetSdk 36/g' build.gradle || true
          
          # التأكد من وجود الإصدار الصحيح من Plugin أندرويد في ملف المشروع الرئيسي
          cd ..
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle || true
          
          # إعادة ضبط الـ Wrapper لإصدار مستقر تماماً
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Final Sovereign Build
        run: |
          cd android
          # تنظيف شامل وجبري
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload Zoon Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-Sovereign-Final
          path: android/app/build/outputs/apk/debug/*.apk
