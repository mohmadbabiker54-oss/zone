name: Build Android Production App

on:
  push:
    branches:
      - main # أو master حسب اسم الفرع الرئيسي لديك
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بنقرة زر من موقع جيتهاب

jobs:
  build:
    name: Generate APK and AAB Packages
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الأكواد من المستودع
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا (مشروعك مضبوط على توافقية حديثة، لذا نستخدم JDK 17)
    - name: Set up Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle # تفعيل التخزين المؤقت لتسريع عمليات البناء القادمة

    # 3. إعطاء صلاحية التنفيذ لأداة البناء Gradle الخاصة بمشروعك
    - name: Grant Execute Permission for Gradlew
      run: chmod +x ./gradlew

    # 4. بناء ملف الـ APK (النسخة التجريبية للتثبيت المباشر)
    - name: Compile and Build APK
      run: ./gradlew assembleDebug

    # 5. بناء ملف الـ AAB (الحزمة الأساسية الجاهزة للرفع إلى جوجل بلاي كونسول)
    - name: Compile and Build App Bundle (AAB)
      run: ./gradlew bundleRelease

    # 6. استخراج وحفظ ملف الـ APK كمخرج (Artifact) جاهز للتحميل
    - name: Archive and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GoogleStudio-App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7 # الاحتفاظ بالملف لمدة 7 أيام على جيتهاب

    # 7. استخراج وحفظ ملف الـ AAB كمخرج (Artifact) جاهز للرفع للمتجر
    - name: Archive and Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: GoogleStudio-App-Production-AAB
        path: app/build/outputs/bundle/release/app-release*.aab
        retention-days: 7
