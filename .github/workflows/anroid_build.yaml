name: Build Android (Zoon - APK and AAB Extraction)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Strategic Repair (XML, SDK & Java)
        run: |
          cd android
          
          # 1. إصلاح صلاحية الوصول في MainActivity.java
          sed -i 's/protected void onStart()/public void onStart()/g' app/src/main/java/com/zoon/agri/app/MainActivity.java

          # 2. إصلاح ملف الأيقونة XML
          mkdir -p app/src/main/res/drawable
          cat <<EOF > app/src/main/res/drawable/ic_launcher_background.xml
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF

          # 3. تنظيف الموارد ورفع الـ SDK إلى 24/36
          rm -f app/src/main/res/values/ic_launcher_background.xml || true
          cd app
          sed -i '/minSdkVersion/d' build.gradle || true
          sed -i '/compileSdk/d' build.gradle || true
          sed -i '/targetSdk/d' build.gradle || true
          sed -i '/android {/a \    compileSdk 36\n    defaultConfig {\n        minSdkVersion 24\n        targetSdk 36\n    }' build.gradle
          
          # 4. تحديث Gradle Wrapper و Plugin
          cd ..
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' build.gradle
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Execute Full Build (APK & AAB)
        run: |
          cd android
          # بناء ملف APK للتجربة وملف AAB للمتجر
          ./gradlew assembleDebug bundleRelease --no-daemon

      - name: Upload APK & AAB Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zoon-App-Packages
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/release/*.aab
